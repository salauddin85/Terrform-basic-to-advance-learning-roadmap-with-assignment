name: Terraform CI

on:
  pull_request:
    branches: [main]
    paths:
      - "**.tf"
      - "**.hcl"
      - ".github/workflows/terraform-ci.yml"
  push:
    branches: [main]
    paths:
      - "**.tf"
      - "**.hcl"

env:
  TF_VERSION:         "1.7.0"
  TERRAGRUNT_VERSION: "0.55.0"
  AWS_REGION:         "us-east-1"

permissions:
  id-token:      write   # for OIDC authentication
  contents:      read
  pull-requests: write   # to post plan output as PR comment

jobs:
  # ── Static checks — fast, zero AWS calls ─────────────────────────────────────
  lint-and-validate:
    name: Lint & Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: |
          terraform fmt -check -recursive -diff
          echo "All .tf files are properly formatted."

      - name: Validate all modules
        run: |
          for dir in modules/*/; do
            echo "Validating $dir..."
            cd "$dir"
            terraform init -backend=false -input=false > /dev/null
            terraform validate
            cd - > /dev/null
          done

  # ── Security scanning ─────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint-and-validate

    steps:
      - uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          soft_fail: false
          additional_args: "--minimum-severity HIGH"

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: terraform
          soft_fail: false
          quiet: true
          download_external_modules: false

  # ── Plan for dev environment ───────────────────────────────────────────────────
  plan-dev:
    name: Plan Dev
    runs-on: ubuntu-latest
    needs: security-scan
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC — no long-lived keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region:        ${{ env.AWS_REGION }}
          role-session-name: github-actions-plan

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Setup Terragrunt
        run: |
          wget -q "https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TERRAGRUNT_VERSION }}/terragrunt_linux_amd64"
          chmod +x terragrunt_linux_amd64
          sudo mv terragrunt_linux_amd64 /usr/local/bin/terragrunt
          terragrunt --version

      - name: Terragrunt Plan — Dev
        id: plan
        working-directory: environments/dev
        run: |
          terragrunt run-all plan \
            --terragrunt-non-interactive \
            --terragrunt-parallelism 4 \
            -out=tfplan 2>&1 | tee plan_output.txt

          echo "Plan completed. Exit code: $?"

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('environments/dev/plan_output.txt', 'utf8');
            const maxLen = 65000;
            const truncated = plan.length > maxLen
              ? plan.substring(0, maxLen) + '\n... (truncated)'
              : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan — Dev\n\`\`\`hcl\n${truncated}\n\`\`\``
            });

  # ── Apply to dev — only on merge to main ────────────────────────────────────
  apply-dev:
    name: Apply Dev
    runs-on: ubuntu-latest
    needs: plan-dev
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: dev
      url: ${{ steps.apply.outputs.alb_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region:        ${{ env.AWS_REGION }}
          role-session-name: github-actions-apply

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Setup Terragrunt
        run: |
          wget -q "https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TERRAGRUNT_VERSION }}/terragrunt_linux_amd64"
          chmod +x terragrunt_linux_amd64
          sudo mv terragrunt_linux_amd64 /usr/local/bin/terragrunt

      - name: Terragrunt Apply — Dev
        id: apply
        working-directory: environments/dev
        run: |
          terragrunt run-all apply \
            --terragrunt-non-interactive \
            --terragrunt-parallelism 4 \
            -auto-approve
